name: Deploy dev preview

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to preview repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PREVIEW_DEPLOY_KEY }}
          external_repository: aidencullo/aidencullo.com-preview
          publish_branch: gh-pages
          publish_dir: ./dist
          cname: dev.aidencullo.com
