name: Promote dev to prod

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR from dev to prod
        run: |
          gh pr create \
            --base prod \
            --head dev \
            --title "Promote dev to prod" \
            --body "Triggered via workflow_dispatch. Merge to deploy." \
            || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
